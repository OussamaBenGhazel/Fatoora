<div class="audit-page">
  <h2>Audit logs</h2>
  @if (loading) {
    <p>Loading...</p>
  } @else {
    <table class="table">
      <thead>
        <tr>
          <th>Time</th>
          <th>Action</th>
          <th>Entity</th>
          <th>User</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody>
        @for (log of logs; track log.id) {
          <tr>
            <td>{{ log.createdAt | date:'short' }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.entityType }} {{ log.entityId }}</td>
            <td>{{ log.username }}</td>
            <td>{{ log.details }}</td>
          </tr>
        }
      </tbody>
    </table>
    <div class="pagination">
      <button type="button" (click)="prev()" [disabled]="page === 0">Previous</button>
      <span>Page {{ page + 1 }} ({{ totalElements }} total)</span>
      <button type="button" (click)="next()" [disabled]="(page + 1) * size >= totalElements">Next</button>
    </div>
  }
</div>
