spring:
  application:
    name: elfatoora-supplier
  datasource:
    url: jdbc:h2:file:./data/elfatoora;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080
  servlet:
    context-path: /api

# El Fatoora / SFTP (configure when credentials available)
elfatoora:
  sftp:
    host: ${SFTP_HOST:localhost}
    port: ${SFTP_PORT:22}
    username: ${SFTP_USER:}
    private-key-path: ${SFTP_KEY_PATH:}
    # Partner root = Matricule Fiscale
    matricule-fiscale: ${MATRICULE_FISCALE:}
  signing:
    # Token / keystore config for ANCE certificate
    keystore-type: PKCS11
    keystore-path: ${KEYSTORE_PATH:}
    keystore-password: ${KEYSTORE_PASSWORD:}
    key-alias: ${KEY_ALIAS:}
  limits:
    max-invoices-per-day-per-client: 100

logging:
  level:
    root: INFO
    tn.tradenet: DEBUG
    org.springframework.security: INFO
