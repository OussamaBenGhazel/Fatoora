spring:
  application:
    name: elfatoora-supplier
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/elFatooraSup}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

server:
  port: 8080
  servlet:
    context-path: /api

# El Fatoora / SFTP (configure when credentials available)
elfatoora:
  sftp:
    host: ${SFTP_HOST:localhost}
    port: ${SFTP_PORT:22}
    username: ${SFTP_USER:}
    private-key-path: ${SFTP_KEY_PATH:}
    # Partner root = Matricule Fiscale
    matricule-fiscale: ${MATRICULE_FISCALE:}
  signing:
    # Token / keystore config for ANCE certificate
    keystore-type: PKCS11
    keystore-path: ${KEYSTORE_PATH:}
    keystore-password: ${KEYSTORE_PASSWORD:}
    key-alias: ${KEY_ALIAS:}
  limits:
    max-invoices-per-day-per-client: 100

logging:
  level:
    root: INFO
    tn.tradenet: DEBUG
    org.springframework.security: INFO
